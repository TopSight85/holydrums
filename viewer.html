<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador - HolyDrums</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.8.9/build/opensheetmusicdisplay.min.js" crossorigin="anonymous"></script>
</head>
<body class="viewer-page">
    <div class="viewer-topbar">
        <button id="btn-back" class="topbar-btn secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2.2"
                 stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
            </svg>
            Voltar
        </button>
        <div class="viewer-song-info">
            <span id="viewer-title" class="viewer-topbar-title"></span>
            <span id="viewer-artist" class="viewer-topbar-artist"></span>
        </div>
        <div class="viewer-topbar-right">
            <div class="tempo-widget">
                <div class="tempo-note-wrap">
                    <span id="viewer-tempo-note">♩</span>
                </div>
                <span class="tempo-sep">=</span>
                <span id="viewer-bpm" class="tempo-input"></span>
                <span class="tempo-bpm">BPM</span>
            </div>
            <button id="btn-reference" class="link-btn" style="display:none;">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
                    <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
                </svg>
                Referência
            </button>
            <button id="btn-layout" class="icon-btn" title="Alternar Layout de Colunas">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <line x1="9" y1="3" x2="9" y2="21"/>
                </svg>
            </button>
            <button id="btn-fullscreen" class="icon-btn" title="Tela Cheia">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>
                </svg>
            </button>
        </div>
    </div>

    <div id="setlist-bar" class="setlist-bar">
        <div id="setlist-bar-inner">
            <!-- Pills da setlist serão renderizadas aqui -->
        </div>
    </div>

    <div id="viewer-content" class="viewer-content">
        <div id="zone-left" class="click-zone left"></div>
        <div id="zone-right" class="click-zone right"></div>
    </div>

    <div class="viewer-footer">
        <div id="setlist-nav" class="setlist-song-nav" style="display:none;">
            <button id="btn-prev-song" class="nav-song-btn" disabled>← anterior</button>
        </div>
        <div class="page-controls">
            <button id="btn-prev" class="page-btn" disabled>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
            </button>
            <div id="page-dots" class="page-dots"></div>
            <span id="page-indicator" class="page-indicator">1 / 1</span>
            <button id="btn-next" class="page-btn" disabled>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"/>
                </svg>
            </button>
        </div>
        <div id="setlist-nav-right" class="setlist-song-nav" style="display:none;">
            <button id="btn-next-song" class="nav-song-btn" disabled>próxima →</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
