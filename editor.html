<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor - HolyDrums</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
</head>
<body class="editor-page">
    <div class="editor-layout">
        <div class="editor-topbar">
            <a href="index.html" class="topbar-btn secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                     stroke="currentColor" stroke-width="2.2"
                     stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"/>
                </svg>
                Voltar
            </a>
            <div class="topbar-actions">
                <a id="btn-view" class="topbar-btn secondary" target="_blank">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    Visualizar
                </a>
                <button id="btn-save" class="topbar-btn primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.2"
                         stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/>
                        <polyline points="17 21 17 13 7 13 7 21"/>
                        <polyline points="7 3 7 8 15 8"/>
                    </svg>
                    Salvar
                </button>
            </div>
        </div>

        <div class="editor-body">
            <div class="editor-sidebar">
                <div class="editor-card">
                    <div class="editor-card-title">Informações</div>
                    <div class="field-group">
                        <label for="song-title" class="field-label">Nome da música</label>
                        <input type="text" id="song-title" class="field-input" placeholder="Ex: Ousado Amor">
                    </div>
                    <div class="field-group">
                        <label for="song-artist" class="field-label">Artista</label>
                        <input type="text" id="song-artist" class="field-input" placeholder="Ex: Isaias Saad">
                    </div>
                    <div class="field-group">
                        <label for="tempo-bpm" class="field-label">Andamento</label>
                        <div class="tempo-row">
                            <select id="tempo-note" class="field-select">
                                <option value="quarter">♩ Semínima</option>
                                <option value="half">𝅗𝅥 Mínima</option>
                                <option value="eighth">♪ Colcheia</option>
                            </select>
                            <span class="tempo-eq">=</span>
                            <input type="number" id="tempo-bpm" class="field-input tempo-bpm-input" value="80">
                            <span class="tempo-bpm-label">BPM</span>
                        </div>
                    </div>
                    <div class="field-group">
                        <label for="song-link" class="field-label">Link de referência</label>
                        <input type="url" id="song-link" class="field-input" placeholder="Ex: https://youtu.be/video-da-musica">
                    </div>
                </div>

                <div class="editor-card">
                    <div class="editor-card-title">Partitura (MusicXML)</div>
                    <div id="upload-zone" class="upload-zone">
                        <label for="file-input" class="upload-zone-label">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"
                                 stroke="currentColor" stroke-width="2"
                                 stroke-linecap="round" stroke-linejoin="round">
                                <path d="M4 14.899A7 7 0 017 4h10a7 7 0 010 14.899"/>
                                <path d="M12 16v6"/>
                                <path d="M15 19l-3 3-3-3"/>
                            </svg>
                            Clique ou arraste o arquivo aqui
                            <small>.xml · .musicxml</small>
                        </label>
                        <input type="file" id="file-input" accept=".xml,.musicxml" style="display:none;">
                        <div id="upload-filename" class="upload-filename" style="display:none;"></div>
                    </div>
                </div>
            </div>

            <div class="editor-main">
                <div class="sections-header">
                    <div class="editor-card-title">Seções e marcações</div>
                    <button id="btn-add-section" class="btn-add-section">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2.5"
                             stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5"  y1="12" x2="19" y2="12"/>
                        </svg>
                        Adicionar seção
                    </button>
                </div>
                <div id="sections-list" class="sections-list">
                    <!-- Seções serão renderizadas aqui -->
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
